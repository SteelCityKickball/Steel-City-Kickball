<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel City Kickball – Waivers</title>

    <!-- Load global CSS (hamburger + nav + buttons) -->
    <link rel="stylesheet" href="src/styles/main.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            position: relative;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            text-shadow: 1px 1px 2px black;
            overflow-x: hidden;
        }

        /* Background with centered logo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
                url("Amazinglogo.png") no-repeat center center fixed;
            background-size: 80vmin;
            opacity: 0.80;
            z-index: 0;
        }

        /* NAV ABOVE EVERYTHING */
        #nav-container {
            position: relative;
            z-index: 2000;
        }

        .page-content {
            position: relative;
            z-index: 1;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .button-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        /* Buttons use main.css styles */
        .button {
            padding: 12px 20px;
            background: rgba(0,0,0,0.7);
            color: ;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            width: 280px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .button.primary {
            background: #C0C0C0;
            color: black;
        }

        .button:hover {
            opacity: 0.85;
        }
    </style>
    <script src="src/identity/global-identity.js" defer></script>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>

<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // ⭐ Identity (controls login/logout/avatar)
      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      // ⭐ Hamburger (mobile menu)
      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }

      // ⭐ Mobile dropdowns (More ▾)
      navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.parentElement.classList.toggle("open");
        });
      });
    })
    .catch(err => console.error("Nav load failed:", err));
</script>

<div class="page-content">

    <h1>Player Waivers & Release Forms</h1>
    <p>All players must complete the required waivers before participating in Steel City Kickball.</p>

    <div class="button-container">

        <a class="button" href="https://github.com/SteelCityKickball/Steel-City-Kickball/blob/main/City%20of%20Lorain%20Parks%20Recreation%20Facilities%20Waiver%20and%20Release%20Agreement.pdf" target="_blank">
            Download City of Lorain Waiver
        </a>

        <a class="button" href="https://github.com/SteelCityKickball/Steel-City-Kickball/blob/main/LeagueWaivers.pdf" target="_blank">
            Download Steel City Kickball League Waiver
        </a>

        <a class="button primary" href="https://docs.google.com/forms/d/1ZVxijW_h6d_UfkGJJGzke2M3FQv1cHOhJu8Aj8JnVfA/preview" target="_blank">
            Complete Digital Waiver Form
        </a>

    </div>

</div>

</body>
</html>
