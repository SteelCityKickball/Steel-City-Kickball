<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonnies Babies — Steel City Kickball</title>

  <!-- MAIN SITE STYLES -->
  <link rel="stylesheet" href="../src/styles/main.css">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("../images/team-logos/bonnies-babies-logo.png") no-repeat center center fixed;
      background-size: 120vmin;
      opacity: 0.80;
      z-index: 0;
    }

    .page-content { position: relative; z-index: 1; padding: 20px; }

    h1 { margin-top: 30px; font-size: 2.5rem; }

    .captain-section {
      margin: 40px auto;
      max-width: 500px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .captain-photo {
      width: 180px; height: 180px; border-radius: 50%;
      object-fit: cover; border: 3px solid white; margin-bottom: 10px;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px; padding: 20px; max-width: 900px; margin: auto;
    }

    .player-card {
      background: rgba(0,0,0,0.6);
      padding: 15px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .player-photo {
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; border: 2px solid white; margin-bottom: 8px;
    }

    .stats-box {
      background: rgba(0,0,0,0.6);
      padding: 20px; margin: 30px auto;
      max-width: 500px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      text-align: left;
    }

    .stats-box h2 { text-align: center; margin-top: 0; }

    .stat-row {
      display: flex; justify-content: space-between; margin: 4px 0;
    }

    .team-blurb {
      max-width: 800px; margin: 40px auto;
      background: rgba(0,0,0,0.6); padding: 20px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      font-size: 1.2rem; line-height: 1.6;
    }
  </style>

  <script src="../src/identity/global-identity.js" defer></script>
</head>

<body>
<div class="page-content">

<!-- ⭐ NEW DYNAMIC NAV -->
<div id="nav-container"></div>

<script>
// Fix nav links ONLY for team pages
function fixTeamPageLinks() {
  const links = document.querySelectorAll("#nav-container a");
  links.forEach(link => {
    const href = link.getAttribute("href");

    // Skip absolute URLs and identity paths
    if (!href || href.startsWith("http") || href.startsWith("src/")) return;

    // Prepend ../ so links work from /teams/
    link.setAttribute("href", "../" + href);
  });
}

fetch("../src/components/nav.html")
  .then(r => r.text())
  .then(html => {
    const nav = document.getElementById("nav-container");
    nav.innerHTML = html;

    // Apply identity styling
    if (window.applyIdentityToUI) window.applyIdentityToUI();

    // Fix paths for team pages
    fixTeamPageLinks();

    // Mobile menu
    const hamburger = nav.querySelector("#hamburger-btn");
    const mobileMenu = nav.querySelector("#mobile-menu");
    if (hamburger && mobileMenu) {
      hamburger.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
      });
    }

    nav.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        btn.parentElement.classList.toggle("open");
      });
    });
  });
</script>

<h1>Bonnies Babies</h1>

<div class="captain-section">
  <img src="../images/team-logos/bonnies-babies-logo.png" class="captain-photo" />
  <h2>Team Captain: (Add Name)</h2>
</div>

<h2>Roster</h2>
<div class="roster-grid">
  <div class="player-card">
    <img src="../images/players/example.png" class="player-photo" />
    <h3>Player Name</h3>
    <p>#00 • Position</p>
  </div>
</div>

<div id="team-stats" class="stats-box">
  <h2>Season Stats</h2>
  <div id="stats-content">Loading stats…</div>
</div>

<div class="team-blurb">
  <p id="team-blurb-text">Loading team blurb…</p>
</div>

</div>

<!-- STATS SCRIPT -->
<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?output=csv";
const teamName = "Bonnies Babies";

function parseCSV(t){ return t.split(/\r?\n/).map(r=>r.split(",")); }
function findHeaderRow(d){ return d.findIndex(r=>r[0]==="Team"); }

function renderStats(row, headers){
  document.getElementById("stats-content").innerHTML =
    headers.map((h,i)=>`<div class="stat-row"><span>${h}:</span><span>${row[i]}</span></div>`).join("");
}

fetch(sheetUrl)
  .then(r=>r.text())
  .then(text=>{
    const data = parseCSV(text);
    const headerIndex = findHeaderRow(data);
    const headers = data[headerIndex];
    const rows = data.slice(headerIndex+1);
    const teamRow = rows.find(r=>r[0]===teamName);

    if(!teamRow){
      document.getElementById("stats-content").innerHTML="No stats found yet.";
      return;
    }

    renderStats(teamRow, headers);
  });
</script>

<!-- BLURB SCRIPT -->
<script>
const blurbSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjwB8-qL3XSI2BlxBsp_ZzusZX7nhltJE4LmDHOPMUUpOQJ5f2EOsJv0sN4wqbbyKVaCIHpn7p9BB8/pub?output=csv";
const blurbTeamName = "Bonnies Babies";

function parseCSVBlurb(text) {
  return text.split(/\r?\n/).map(r => r.split(","));
}

fetch(blurbSheetUrl)
  .then(r => r.text())
  .then(text => {
    const data = parseCSVBlurb(text);

    const headerIndex = data.findIndex(r => r[0] === "Team Name");
    if (headerIndex === -1) {
      document.getElementById("team-blurb-text").innerText =
        "Blurb sheet header not found.";
      return;
    }

    const rows = data.slice(headerIndex + 1);
    const row = rows.find(r => r[0] === blurbTeamName);

    if (!row || !row[1]) {
      document.getElementById("team-blurb-text").innerText =
        "No blurb submitted yet.";
      return;
    }

    document.getElementById("team-blurb-text").innerText = row[1];
  });
</script>

</body>
</html>
