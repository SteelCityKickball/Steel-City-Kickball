<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J4K — Steel City Kickball</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; text-align: center; }
    nav ul { list-style: none; display: flex; justify-content: center; gap: 20px; padding: 0; margin-bottom: 20px; }
    nav a { text-decoration: none; font-weight: bold; color: #222; }
    nav a:hover { text-decoration: underline; }
    .stats-box { background: #fff; padding: 20px; margin: 15px auto; max-width: 400px; border-radius: 8px; border: 1px solid #ccc; text-align: left; }
    .stats-box h2 { text-align: center; margin-top: 0; }
    .stat-row { display: flex; justify-content: space-between; margin: 4px 0; }
    .loading { margin-top: 20px; color: #555; }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/schedule.html">Schedule</a></li>
    <li><a href="/standings.html">Standings</a></li>
    <li><a href="/teams.html">Teams</a></li>
    <li><a href="/waivers.html">Waivers</a></li>
  </ul>
</nav>

<h1>J4K</h1>
<p>Team stats are pulled live from the league stats sheet.</p>

<div id="team-stats" class="stats-box">
  <h2>Season Stats</h2>
  <div id="stats-content" class="loading">Loading stats…</div>
</div>

<script>
  const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?output=csv";
  const teamName = "J4K";

  function parseCSV(text) {
    return text.split(/\r?\n/).map(r => r.split(","));
  }

  function findHeaderRow(data) {
    return data.findIndex(r => r[0] && r[0].trim() === "Team");
  }

  function renderStats(row, headers) {
    const box = document.getElementById("stats-content");
    box.innerHTML = headers.map((h, i) =>
      `<div class="stat-row"><span>${h}:</span><span>${row[i]}</span></div>`
    ).join("");
  }

  fetch(sheetUrl)
    .then(r => r.text())
    .then(text => {
      const data = parseCSV(text);
      const headerIndex = findHeaderRow(data);
      const headers = data[headerIndex];
      const rows = data.slice(headerIndex + 1);
      const teamRow = rows.find(r => r[0] === teamName);

      if (!teamRow) {
        document.getElementById("stats-content").innerHTML = "No stats found yet.";
        return;
      }

      renderStats(teamRow, headers);
    });
</script>

</body>
</html>
