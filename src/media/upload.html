<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Media – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="upload-page">

    <div class="page-container">

        <h1 class="page-title">Upload Media</h1>

        <form class="upload-form">

            <label>Select Image</label>
            <input type="file" accept="image/*" />

            <label>Caption</label>
            <input type="text" placeholder="Add a caption..." />

            <label>Tags</label>
            <input type="text" placeholder="#kickball #gametime" />

            <button type="submit" class="upload-button">Upload</button>

        </form>

        <a href="/src/media/gallery.html" class="back-link">Back to Gallery</a>

    </div>

</body>
</html>
