<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Gallery – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="gallery-page">

    <div class="page-container">

        <h1 class="page-title">Media Gallery</h1>

        <div class="gallery-grid">

            <!-- Example media cards (these will be dynamic later) -->
            <div class="media-card">
                <img class="media-thumb" src="/src/assets/sample-media.jpg" alt="Media" />
                <div class="media-info">
                    <p class="media-caption">Game Day Hype</p>
                    <p class="media-tags">#kickball #steelcity</p>
                </div>
            </div>

            <div class="media-card">
                <img class="media-thumb" src="/src/assets/sample-media.jpg" alt="Media" />
                <div class="media-info">
                    <p class="media-caption">Team Victory</p>
                    <p class="media-tags">#champions</p>
                </div>
            </div>

            <div class="media-card">
                <img class="media-thumb" src="/src/assets/sample-media.jpg" alt="Media" />
                <div class="media-info">
                    <p class="media-caption">Kickoff Moment</p>
                    <p class="media-tags">#gametime</p>
                </div>
            </div>

        </div>

        <a href="/src/media/upload.html" class="upload-link">Upload New Media</a>

    </div>

</body>
</html>
