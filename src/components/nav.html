<!-- IDENTITY + LOGIN + LOGOUT + COMMISSIONER REDIRECT -->
<script>
/* GOOGLE LOGIN CALLBACK */
function handleCredentialResponse(response) {
  const data = jwt_decode(response.credential);
  const email = data.email;

  // Save email
  localStorage.setItem("sck_user_email", email);

  // Fetch role from Apps Script
  fetch("https://script.google.com/macros/s/AKfycbz.../exec?email=" + email)
    .then(res => res.json())
    .then(user => {
      const role = user.role || "player";
      localStorage.setItem("sck_user_role", role);

      // Redirect commissioners
      if (role === "commissioner") {
        window.location.href = "commissioner.html";
      } else {
        window.location.reload();
      }
    });
}

/* LOGOUT */
function logoutUser() {
  localStorage.removeItem("sck_user_email");
  localStorage.removeItem("sck_user_role");
  window.location.href = "index.html";
}

document.getElementById("nav-logout-btn").addEventListener("click", logoutUser);
document.getElementById("mobile-logout-btn").addEventListener("click", logoutUser);

/* INITIALIZE NAV STATE */
function initIdentity() {
  const email = localStorage.getItem("sck_user_email");
  const role = localStorage.getItem("sck_user_role");

  const navUser = document.getElementById("nav-user");
  const navGoogle = document.getElementById("nav-google-login");
  const navLogout = document.getElementById("nav-logout-btn");

  const mobileAvatar = document.getElementById("mobile-avatar");
  const mobileName = document.getElementById("mobile-name");
  const mobileGoogle = document.getElementById("mobile-google-login");
  const mobileLogout = document.getElementById("mobile-logout-btn");
  const mobileProfile = document.getElementById("mobile-profile-row");

  if (email) {
    // Desktop
    navUser.classList.remove("hidden");
    navGoogle.classList.add("hidden");
    navLogout.classList.remove("hidden");

    // Mobile
    mobileAvatar.classList.remove("hidden");
    mobileGoogle.classList.add("hidden");
    mobileLogout.classList.remove("hidden");
    mobileProfile.classList.remove("hidden");
    mobileName.textContent = email;
    mobileName.classList.remove("hidden");
  }
}

initIdentity();

/* RENDER GOOGLE LOGIN IN MOBILE MENU */
document.getElementById("hamburger-btn").addEventListener("click", () => {
  const menu = document.getElementById("mobile-menu");
  menu.classList.toggle("open");

  if (menu.classList.contains("open")) {
    const mobileBtn = document.getElementById("mobile-google-button");

    if (!mobileBtn.dataset.rendered) {
      google.accounts.id.renderButton(
        mobileBtn,
        { theme: "outline", size: "medium" }
      );
      mobileBtn.dataset.rendered = "true";
    }
  }
});
</script>
