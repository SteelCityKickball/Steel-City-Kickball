<script>
  const WEB_APP_URL =
    "https://script.google.com/macros/s/AKfycbyofNQOa8YJkRticXHtVV4p3BTscvK2qKu9kZKR9qpAu4XefGrjNcuQD818DaCyqCS4/exec";

  async function applyIdentityToUI() {
    const email = localStorage.getItem("sck_user_email");

    const welcome = document.getElementById("nav-welcome");
    const mobileWelcome = document.getElementById("mobile-welcome");
    const loginBtn = document.getElementById("nav-google-login");
    const mobileLoginBtn = document.getElementById("mobile-google-login");
    const logoutBtn = document.getElementById("nav-logout-btn");
    const mobileLogoutBtn = document.getElementById("mobile-logout-btn");

    if (!email) {
      // Not logged in
      loginBtn.style.display = "block";
      mobileLoginBtn.style.display = "block";
      logoutBtn.style.display = "none";
      mobileLogoutBtn.style.display = "none";
      welcome.style.display = "none";
      mobileWelcome.style.display = "none";
      return;
    }

    // Logged in
    welcome.textContent = email;
    mobileWelcome.textContent = email;
    welcome.style.display = "inline";
    mobileWelcome.style.display = "inline";

    loginBtn.style.display = "none";
    mobileLoginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    mobileLogoutBtn.style.display = "inline-block";

    // Check commissioner role
    const check = await fetch(
      WEB_APP_URL + "?action=checkRole&email=" + encodeURIComponent(email)
    ).then(r => r.json());

    if (check.status === "ok") {
      window.location.href = "/Steel-City-Kickball/commissioner/commissioner.html";
    }
  }

  function logout() {
    localStorage.removeItem("sck_user_email");
    window.location.reload();
  }

  function handleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email;

    localStorage.setItem("sck_user_email", email);
    window.location.reload();
  }
</script>
