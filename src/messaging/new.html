<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Message – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="new-message-page">

    <div class="page-container">

        <h1 class="page-title">Start New Message</h1>

        <form class="new-message-form">

            <label>Recipient</label>
            <input type="text" placeholder="Search for a player..." />

            <label>Message</label>
            <textarea placeholder="Type your message..." rows="4"></textarea>

            <button type="submit" class="send-button">Send Message</button>

        </form>

        <a href="/src/messaging/inbox.html" class="back-link">Back to Inbox</a>

    </div>

</body>
</html>
