<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="inbox-page">

    <div class="page-container">

        <h1 class="page-title">Messages</h1>

        <div class="inbox-list">

            <!-- Example conversation cards -->
            <div class="conversation-card">
                <img class="conversation-avatar" src="/src/assets/default-avatar.png" alt="Avatar" />
                <div class="conversation-info">
                    <h3 class="conversation-name">Player One</h3>
                    <p class="conversation-preview">Hey! Are you coming to the game?</p>
                </div>
                <span class="conversation-time">3:12 PM</span>
            </div>

            <div class="conversation-card">
                <img class="conversation-avatar" src="/src/assets/default-avatar.png" alt="Avatar" />
                <div class="conversation-info">
                    <h3 class="conversation-name">Player Two</h3>
                    <p class="conversation-preview">Let’s meet early to warm up.</p>
                </div>
                <span class="conversation-time">1:47 PM</span>
            </div>

            <div class="conversation-card">
                <img class="conversation-avatar" src="/src/assets/default-avatar.png" alt="Avatar" />
                <div class="conversation-info">
                    <h3 class="conversation-name">Team Captain</h3>
                    <p class="conversation-preview">Roster updated — check it out.</p>
                </div>
                <span class="conversation-time">Yesterday</span>
            </div>

        </div>

        <a href="/src/messaging/new.html" class="new-message-link">Start New Message</a>

    </div>

</body>
</html>
