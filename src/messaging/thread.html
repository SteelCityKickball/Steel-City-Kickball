<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Thread – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="thread-page">

    <div class="page-container">

        <div class="thread-header">
            <img class="thread-avatar" src="/src/assets/default-avatar.png" alt="Avatar" />
            <h2 class="thread-name">Player Name</h2>
        </div>

        <div class="thread-messages">

            <!-- Example messages -->
            <div class="message-bubble them">
                <p class="message-text">Hey! Are you coming to the game tonight?</p>
                <span class="message-time">3:12 PM</span>
            </div>

            <div class="message-bubble you">
                <p class="message-text">Yep! I’ll be there early.</p>
                <span class="message-time">3:14 PM</span>
            </div>

        </div>

        <div class="thread-input">
            <input type="text" placeholder="Type a message..." />
            <button class="send-button">Send</button>
        </div>

        <a href="/src/messaging/inbox.html" class="back-link">Back to Inbox</a>

    </div>

</body>
</html>
