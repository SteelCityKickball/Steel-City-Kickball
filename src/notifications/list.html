<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="notifications-page">

    <div class="page-container">

        <h1 class="page-title">Notifications</h1>

        <div class="notifications-list">

            <!-- Example notifications -->
            <div class="notification-card">
                <div class="notification-icon">❤️</div>
                <div class="notification-info">
                    <p class="notification-text">Player One liked your photo.</p>
                    <span class="notification-time">Just now</span>
                </div>
            </div>

            <div class="notification-card">
                <div class="notification-icon">💬</div>
                <div class="notification-info">
                    <p class="notification-text">Player Two sent you a message.</p>
                    <span class="notification-time">5m ago</span>
                </div>
            </div>

            <div class="notification-card">
                <div class="notification-icon">📸</div>
                <div class="notification-info">
                    <p class="notification-text">Your media upload was approved.</p>
                    <span class="notification-time">1h ago</span>
                </div>
            </div>

        </div>

        <a href="/src/notifications/settings.html" class="settings-link">Notification Settings</a>

    </div>

</body>
</html>
