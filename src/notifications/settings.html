<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification Settings – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="notification-settings-page">

    <div class="page-container">

        <h1 class="page-title">Notification Settings</h1>

        <form class="notification-settings-form">

            <label class="toggle-row">
                <span>Likes</span>
                <input type="checkbox" checked />
            </label>

            <label class="toggle-row">
                <span>Messages</span>
                <input type="checkbox" checked />
            </label>

            <label class="toggle-row">
                <span>Team Invites</span>
                <input type="checkbox" checked />
            </label>

            <label class="toggle-row">
                <span>Media Approvals</span>
                <input type="checkbox" />
            </label>

            <label class="toggle-row">
                <span>Mentions</span>
                <input type="checkbox" />
            </label>

            <label class="toggle-row">
                <span>System Alerts</span>
                <input type="checkbox" checked />
            </label>

            <button type="submit" class="save-button">Save Settings</button>

        </form>

        <a href="/src/notifications/list.html" class="back-link">Back to Notifications</a>

    </div>

</body>
</html>
