<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="auth-page">

    <div class="auth-container">

        <h1 class="auth-title">Steel City Kickball</h1>
        <h2 class="auth-subtitle">Sign In</h2>

        <form id="loginForm" class="auth-form">

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="••••••••" required />

            <button type="submit" class="auth-button">Continue</button>

        </form>

        <div class="auth-links">
            <a href="#">Forgot password?</a>
            <a href="#">Create an account</a>
        </div>

    </div>

    <script src="/src/identity/login.js"></script>

</body>
</html>
