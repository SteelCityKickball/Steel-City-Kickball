<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="settings-page">

    <div class="page-container">

        <h1 class="page-title">Edit Profile</h1>

        <form id="settingsForm" class="settings-form">

            <label for="nickname">Nickname</label>
            <input id="nickname" name="nickname" type="text" placeholder="Your nickname" />

            <label for="avatar">Avatar URL</label>
            <input id="avatar" name="avatar" type="text" placeholder="https://example.com/avatar.jpg" />

            <label for="primaryTeam">Primary Team</label>
            <select id="primaryTeam" name="primaryTeam">
                <option value="">Select team</option>
                <option value="The Club">The Club</option>
                <option value="Steel City">Steel City</option>
                <option value="Kickaholics">Kickaholics</option>
            </select>

            <label for="secondaryTeam">Secondary Team</label>
            <select id="secondaryTeam" name="secondaryTeam">
                <option value="">None</option>
                <option value="The Club">The Club</option>
                <option value="Steel City">Steel City</option>
                <option value="Kickaholics">Kickaholics</option>
            </select>

            <button type="submit" class="save-button">Save Changes</button>

        </form>

        <a href="/src/identity/profile.html" class="back-link">Back to Profile</a>

    </div>

    <script src="/src/identity/settings.js"></script>

</body>
</html>
