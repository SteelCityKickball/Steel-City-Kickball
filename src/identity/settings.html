<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile – Steel City Kickball</title>

    <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body class="settings-page">

    <div class="page-container">

        <h1 class="page-title">Edit Profile</h1>

        <form class="settings-form">

            <label>Nickname</label>
            <input type="text" placeholder="Your nickname" />

            <label>Avatar URL</label>
            <input type="text" placeholder="https://example.com/avatar.jpg" />

            <label>Primary Team</label>
            <select>
                <option>Select team</option>
                <option>The Club</option>
                <option>Steel City</option>
                <option>Kickaholics</option>
            </select>

            <label>Secondary Team</label>
            <select>
                <option>None</option>
                <option>The Club</option>
                <option>Steel City</option>
                <option>Kickaholics</option>
            </select>

            <button type="submit" class="save-button">Save Changes</button>

        </form>

        <a href="/src/identity/profile.html" class="back-link">Back to Profile</a>

    </div>

</body>
</html>
