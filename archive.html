<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Archive — Steel City Kickball</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    /* OPTION C – darkened logo + red/black background */
    body {
      position: relative;
      background: #000; /* fallback */
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
    }

   body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(160,0,0,0.85) 0%, rgba(0,0,0,0.97) 80%),
    url("Amazinglogo.png") no-repeat center center fixed;
  background-size: 70%;
  opacity: 0.72; 
  filter: none;   /* IMPORTANT: removes the muddy look */
  z-index: 0;
}

    /* All page content sits ABOVE the background */
    .page-content {
      position: relative;
      z-index: 1;
    }

    nav ul {
      list-style: none;
      padding: 10px;
      margin: 0;
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.8);
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    h1, h2 {
      margin-left: 20px;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .archive-grid img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>
<div class="page-content">
  <nav>
    <ul>
      <li><a href="/Steel-City-Kickball/">Home</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="standings.html">Standings</a></li>
      <li><a href="teams.html">Teams</a></li>
      <li><a href="waiver.html">Waivers</a></li>
      <li><a href="archive.html">Archive</a></li>
    </ul>
  </nav>

  <h1>Photo Archive</h1>

  <h2>Homepage Photos</h2>
  <div id="archive-grid" class="archive-grid"></div>

  <h2>Game of the Week Archive</h2>
  <div id="gotw-archive-grid" class="archive-grid"></div>

  <h2>MVP Archive</h2>
  <div id="mvp-archive-grid" class="archive-grid"></div>
</div>

<script>
async function getLatestFromGitHub(path) {
  const apiUrl = `https://api.github.com/repos/SteelCityKickball/Steel-City-Kickball/contents/${path}`;
  const response = await fetch(apiUrl);
  const files = await response.json();

  const images = files.filter(f =>
    f.name.match(/\.(jpg|jpeg|png|gif)$/i)
  );

  images.sort((a, b) => b.name.localeCompare(a.name));
  return images;
}

async function loadArchive() {
  const homepage = await getLatestFromGitHub("images/homepage");
  const homepageGrid = document.getElementById("archive-grid");
  homepage.forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    homepageGrid.appendChild(img);
  });

  const gotw = await getLatestFromGitHub("images/gotw-archive");
  const gotwGrid = document.getElementById("gotw-archive-grid");
  gotw.forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    gotwGrid.appendChild(img);
  });

  const mvp = await getLatestFromGitHub("images/mvp-archive");
  const mvpGrid = document.getElementById("mvp-archive-grid");
  mvp.forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    mvpGrid.appendChild(img);
  });
}

loadArchive();
</script>

</body>
</html>
