<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Archive — Steel City Kickball</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
      margin: 0;
      background: #000;
    }
    nav a {
      text-decoration: none;
      font-weight: bold;
      color: #fff;
      font-size: 18px;
    }
    nav a:hover {
      color: #ffcc00;
    }

    h1 {
      margin-top: 30px;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .archive-grid img {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<nav>
  <ul>

<h1>Photo Archive</h1>

<div id="archive-grid" class="archive-grid"></div>

<script>
async function getLatestFromGitHub(path) {
  const apiUrl = `https://api.github.com/repos/SteelCityKickball/Steel-City-Kickball/contents/${path}`;
  const response = await fetch(apiUrl);
  const files = await response.json();

  const images = files.filter(f =>
    f.name.match(/\.(jpg|jpeg|png|gif)$/i)
  );

  images.sort((a, b) => b.name.localeCompare(a.name));
  return images;
}

async function loadArchive() {
  const photos = await getLatestFromGitHub("images/homepage");
  const grid = document.getElementById("archive-grid");

  photos.forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    grid.appendChild(img);
  });
}

loadArchive();
</script>

</body>
</html>
