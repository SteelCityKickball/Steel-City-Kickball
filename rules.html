<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Rules</title>

  <link rel="stylesheet" href="src/styles/main.css">
  <script src="src/identity/global-identity.js" defer></script>
</head>

<body>

<div id="nav-container"></div>

<div class="page-content">
  <h1>League Rules</h1>
  <p>These rules update automatically when commissioners edit the Google Sheet.</p>

  <div id="rules-list">Loading rules...</div>
</div>

<script>
  // ⭐ CORRECT RULES SHEET + CORRECT TAB (YOUR URL)
  const csvUrl =
    "https://docs.google.com/spreadsheets/d/1a9LOLxB13xRGLso51ez7xN_9DT7qdhy_wWKxNuOxNzI/export?format=csv&gid=1916317791";

  async function loadRules() {
    const res = await fetch(csvUrl);
    const text = await res.text();
    const rows = text.split(/\r?\n/).map(r => r.split(","));

    // Filter rows where first column starts with "rule_"
    const rules = rows.filter(r => r[0] && r[0].trim().startsWith("rule_"));

    let html = "<ul>";
    rules.forEach(r => {
      const ruleText = r[1] ? r[1].trim() : "";
      html += `<li>${ruleText}</li>`;
    });
    html += "</ul>";

    document.getElementById("rules-list").innerHTML = html;
  }

  // Load nav + identity
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      if (window.applyIdentityToUI) window.applyIdentityToUI();

      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    });

  loadRules();
</script>

</body>
</html>
