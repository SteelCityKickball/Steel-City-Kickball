<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Registration — Steel City Kickball</title>

  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    .content-box {
      background: rgba(0,0,0,0.75);
      padding: 25px;
      border-radius: 10px;
      max-width: 800px;
      margin: 40px auto;
      color: white;
      text-align: center;
    }

    .reg-button {
      display: inline-block;
      padding: 14px 24px;
      background: #8B0000;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      margin-top: 20px;
      font-weight: bold;
    }

    .reg-button:hover {
      background: #A00000;
    }
  </style>
  <script src="src/scripts/global-identity.js" defer></script>
</head>

<body>

<!-- NAV -->
<div id="nav-container"></div>
<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // ⭐ Identity (controls login/logout/avatar)
      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      // ⭐ Hamburger (mobile menu)
      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }

      // ⭐ Mobile dropdowns (More ▾)
      navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.parentElement.classList.toggle("open");
        });
      });
    })
    .catch(err => console.error("Nav load failed:", err));
</script>

<div class="page-content">

  <div class="content-box">
    <h1>Player Registration</h1>
    <p>
      Register once — your information and waiver are all collected in a single form.
      No duplicate entries, no repeated questions, no hassle.
    </p>

    <!-- ⭐ Correct Google Form URL inserted here ⭐ -->
    <a class="reg-button"
       href="https://docs.google.com/forms/d/1ZVxijW_h6d_UfkGJJGzke2M3FQv1cHOhJu8Aj8JnVfA/preview"
       target="_blank">
      Complete Registration & Waiver
    </a>

    <p style="margin-top:20px; font-size:14px; color:#ccc;">
      This form includes: player info, emergency contact, waiver agreements, and league registration questions.
    </p>
  </div>

</div>

</body>
</html>
