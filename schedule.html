<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Schedule</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: 90%;
      opacity: 0.80;
      z-index: 0;
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 900px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #fff;
    }

    h1, h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<!-- ⭐ NEW DYNAMIC NAVIGATION ⭐ -->
<div id="nav-container"></div>
<script>
  fetch("/src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;
    });
</script>

<div class="page-content">

<h1>Steel City Kickball — League Schedule</h1>

<h2>Upcoming Games</h2>
<div id="schedule-container">Loading schedule...</div>

<h2>Results</h2>
<div id="results-container">No results yet.</div>

</div>

<script>
  const scheduleUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnsrFD-xSe7RDLO_PEcX6RMQ5HBPC9S3JhQ1i-Tek6m0Z6ZE0HeunDZ5xWNNkd5vwjJGFaN1EFubR9/pub?output=csv";

  const resultsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTt2eUK_a8_78KlrEtuZ_yeZs-jMxBP630-Q-2X69FGwEjN9oLsakD-w6xN6DdGGBa0CLEAjyqOCVBr/pub?output=csv";

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    return rows.map(row => row.split(",").map(cell => cell.trim()));
  }

  function renderTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    let html = "<table><tr>";
    data[0].forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      html += "<tr>";
      row.forEach(cell => html += `<td>${cell}</td>`);
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  // Load schedule
  fetch(scheduleUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);
      renderTable(data, "schedule-container");
    });

  // Load results
  fetch(resultsUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);
      if (data.length <= 1) {
        document.getElementById("results-container").innerHTML = "No results yet.";
      } else {
        renderTable(data, "results-container");
      }
    })
    .catch(() => {
      document.getElementById("results-container").innerHTML = "No results yet.";
    });
</script>

</body>
</html>
