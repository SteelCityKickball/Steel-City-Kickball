<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Schedule</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      text-align: center;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin-bottom: 20px;
    }
    nav a {
      text-decoration: none;
      font-weight: bold;
      color: #222;
    }
    nav a:hover {
      text-decoration: underline;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 900px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #222;
      color: #fff;
    }
    h2 {
      margin-top: 40px;
    }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="/Steel-City-Kickball/">Home</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="standings.html">Standings</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="waivers.html">Waivers</a></li>
  </ul>
</nav>

<h1>Steel City Kickball — League Schedule</h1>

<h2>Upcoming Games</h2>
<div id="schedule-container">Loading schedule...</div>

<h2>Results</h2>
<div id="results-container">No results yet.</div>

<script>
  const scheduleUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?gid=0&output=csv";

  const resultsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?gid=123456789&output=csv";

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    return rows.map(row => row.split(",").map(cell => cell.trim()));
  }

  function renderTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    let html = "<table><tr>";
    data[0].forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      html += "<tr>";
      row.forEach(cell => html += `<td>${cell}</td>`);
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  // Load schedule
  fetch(scheduleUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);
      renderTable(data, "schedule-container");
    });

  // Load results
  fetch(resultsUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);
      if (data.length <= 1) {
        document.getElementById("results-container").innerHTML = "No results yet.";
      } else {
        renderTable(data, "results-container");
      }
    })
    .catch(() => {
      document.getElementById("results-container").innerHTML = "No results yet.";
    });
</script>

</body>
</html>
