<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Schedule</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      overflow-x: hidden;
    }

    /* Background overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: cover;
      opacity: 0.80;
      z-index: 0;
    }

    /* NAV WRAPPER */
    #nav-container {
      position: relative;
      z-index: 2000;
    }

    /* NAVBAR BASE */
    .navbar {
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.75);
      position: relative;
      z-index: 2000;
    }

    .nav-title {
      font-size: 22px;
      font-weight: bold;
      color: #ffcc00;
    }

    /* HAMBURGER BUTTON */
    .hamburger {
      font-size: 30px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      display: block;
    }

    /* MOBILE MENU (SLIDE OUT) */
    .mobile-menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 240px;
      height: 100%;
      background: rgba(0,0,0,0.95);
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: left 0.3s ease;
      z-index: 3000;
    }

    .mobile-menu a {
      color: white;
      text-decoration: none;
      font-size: 20px;
      padding: 12px 20px;
      text-align: left;
    }

    .mobile-menu a:hover {
      background: rgba(255,255,255,0.1);
    }

    .mobile-menu.open {
      left: 0;
    }

    /* DESKTOP NAV LINKS (HIDDEN FOR NOW) */
    .nav-right a {
      display: none;
    }

    /* PAGE CONTENT */
    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    /* TABLE WRAPPER FOR MOBILE SCROLL */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 auto;
      width: 100%;
    }

    /* Table styling */
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 1000px; /* full width for scroll */
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
      font-size: 14px;
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #ffcc00;
      font-weight: 700;
    }

    tr.future td {
      background: rgba(0, 128, 0, 0.25);
    }

    tr.today td {
      background: rgba(255, 215, 0, 0.35);
      font-weight: bold;
    }

    tr.past td {
      background: rgba(255, 0, 0, 0.20);
    }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 4px;
    }

    .team-link {
      color: #ffcc00;
      font-weight: bold;
      font-size: 14px;
    }

    .team-link:hover {
      text-decoration: underline;
    }

    .week-selector {
      margin: 20px auto;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    h1, h2 {
      margin-top: 30px;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
      table {
        width: 900px;
      }

      th, td {
        padding: 8px;
        font-size: 13px;
      }

      .team-logo {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>
<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;
    });
</script>

<div class="page-content">

<h1>Steel City Kickball — League Schedule</h1>

<select id="week-select" class="week-selector">
  <option value="all">Show All Weeks</option>
</select>

<h2>Upcoming Games</h2>
<div class="table-wrapper">
  <div id="schedule-container">Loading schedule...</div>
</div>

<h2>Results</h2>
<div class="table-wrapper">
  <div id="results-container">No results yet.</div>
</div>

</div>

<script>
  const scheduleUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnsrFD-xSe7RDLO_PEcX6RMQ5HBPC9S3JhQ1i-Tek6m0Z6ZE0HeunDZ5xWNNkd5vwjJGFaN1EFubR9/pub?output=csv";

  const resultsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTt2eUK_a8_78KlrEtuZ_yeZs-jMxBP630-Q-2X69FGwEjN9oLsakD-w6xN6DdGGBa0CLEAjyqOCVBr/pub?output=csv";

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    return rows.map(row => row.split(",").map(cell => cell.trim()));
  }

  function getTeamLogo(team) {
    return `images/${team}-logo.png`;
  }

  function teamLink(team) {
    return `<a class="team-link" href="teams/${team}.html">${team}</a>`;
  }

  function fieldMapLink(field) {
    return `<a href="https://www.google.com/maps/search/${encodeURIComponent(field)}" target="_blank">${field}</a>`;
  }

  function classifyRow(dateString) {
    const today = new Date();
    const gameDate = new Date(dateString);
    if (isNaN(gameDate)) return "";
    if (gameDate.toDateString() === today.toDateString()) return "today";
    if (gameDate > today) return "future";
    return "past";
  }

  function renderEnhancedTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    const headers = data[0];
    let html = "<table><tr>";

    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      const rowClass = classifyRow(row[0]);
      html += `<tr class="${rowClass}">`;

      row.forEach((cell, i) => {
        let output = cell;

        if (headers[i].toLowerCase().includes("team")) {
          output = `<img class="team-logo" src="${getTeamLogo(cell)}" onerror="this.style.display='none'"> ${teamLink(cell)}`;
        }

        if (headers[i].toLowerCase().includes("field")) {
          output = fieldMapLink(cell);
        }

        html += `<td>${output}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  /* LOAD SCHEDULE */
  fetch(scheduleUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);

      const weekIndex = data[0].findIndex(h => h.toLowerCase() === "week");
      const weeks = [...new Set(data.slice(1).map(r => r[weekIndex]))];

      const select = document.getElementById("week-select");
      weeks.forEach(w => {
        const opt = document.createElement("option");
        opt.value = w;
        opt.textContent = "Week " + w;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        const selected = select.value;
        if (selected === "all") {
          renderEnhancedTable(data, "schedule-container");
        } else {
          const filtered = [data[0], ...data.slice(1).filter(r => r[weekIndex] === selected)];
          renderEnhancedTable(filtered, "schedule-container");
        }
      });

      renderEnhancedTable(data, "schedule-container");
    });

  /* LOAD RESULTS */
  fetch(resultsUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);
      if (data.length <= 1) {
        document.getElementById("results-container").innerHTML = "No results yet.";
      } else {
        renderEnhancedTable(data, "results-container");
      }
    })
    .catch(() => {
      document.getElementById("results-container").innerHTML = "No results yet.";
    });
</script>

</body>
</html>
