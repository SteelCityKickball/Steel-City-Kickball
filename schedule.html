<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Schedule</title>

  <!-- ⭐ FIXED: Load global CSS so hamburger works -->
  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      overflow-x: hidden;
    }

    /* Background overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: cover;
      opacity: 0.80;
      z-index: 0;
    }

    /* NAV WRAPPER */
    #nav-container {
      position: relative;
      z-index: 2000;
    }

    /* PAGE CONTENT */
    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    /* TABLE WRAPPER FOR MOBILE SCROLL */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 auto;
      width: 100%;
    }

    /* Table styling */
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 1000px; /* full width for scroll */
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
      font-size: 14px;
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #ffcc00;
      font-weight: 700;
    }

    tr.future td {
      background: rgba(0, 128, 0, 0.25);
    }

    tr.today td {
      background: rgba(255, 215, 0, 0.35);
      font-weight: bold;
    }

    tr.past td {
      background: rgba(255, 0, 0, 0.20);
    }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 4px;
    }

    .team-link {
      color: #ffcc00;
      font-weight: bold;
      font-size: 14px;
    }

    .team-link:hover {
      text-decoration: underline;
    }

    .week-selector {
      margin: 20px auto;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    h1, h2 {
      margin-top: 30px;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {
      table {
        width: 900px;
      }

      th, td {
        padding: 8px;
        font-size: 13px;
      }

      .team-logo {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>
<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;
    });
</script>

<div class="page-content">

<h1>Steel City Kickball — League Schedule</h1>

<select id="week-select" class="week-selector">
  <option value="all">Show All Weeks</option>
</select>

<h2>Upcoming Games</h2>
<div class="table-wrapper">
  <div id="schedule-container">Loading schedule...</div>
</div>

<h2>Results</h2>
<div class="table-wrapper">
  <div id="results-container">No results yet.</div>
</div>

</div>

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    return rows.map(row => row.split(",").map(cell => cell.trim()));
  }

  function getTeamLogo(team) {
    return `images/${team}-logo.png`;
  }

  function teamLink(team) {
    return `<a class="team-link" href="teams/${team}.html">${team}</a>`;
  }

  function fieldMapLink(field) {
    return `<a href="https://www.google.com/maps/search/${encodeURIComponent(field)}" target="_blank">${field}</a>`;
  }

  function classifyRow(dateString) {
    const today = new Date();
    const gameDate = new Date(dateString);
    if (isNaN(gameDate)) return "";
    if (gameDate.toDateString() === today.toDateString()) return "today";
    if (gameDate > today) return "future";
    return "past";
  }
