<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Schedule</title>

  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    .table-wrapper { overflow-x: auto; margin: 0 auto; width: 100%; }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 1000px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
      font-size: 14px;
    }

    th { background: rgba(0,0,0,0.9); color: #C0C0C0; font-weight: 700; }
    tr.future td { background: rgba(0,128,0,0.25); }
    tr.today td { background: rgba(255,215,0,0.35); font-weight: bold; }
    tr.past td { background: rgba(255,0,0,0.20); }

    .team-logo { width: 22px; height: 22px; margin-right: 4px; }
    .team-link { color: #C0C0C0; font-weight: bold; font-size: 14px; }

    .week-selector {
      margin: 20px auto;
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    @media (max-width: 768px) {
      table { width: 900px; }
      th, td { padding: 8px; font-size: 13px; }
      .team-logo { width: 18px; height: 18px; }
    }
  </style>

  <script src="src/identity/global-identity.js" defer></script>
</head>

<body>

<div class="page-content">

  <div id="nav-container"></div>

  <script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      if (window.applyIdentityToUI) window.applyIdentityToUI();

      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }

      navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.parentElement.classList.toggle("open");
        });
      });
    });
  </script>

  <h1>Steel City Kickball — League Schedule</h1>

  <select id="week-select" class="week-selector">
    <option value="all">Show All Weeks</option>
  </select>

  <h2>Upcoming Games</h2>
  <div class="table-wrapper">
    <div id="schedule-container">Loading schedule...</div>
  </div>

  <h2>Results</h2>
  <div class="table-wrapper">
    <div id="results-container">No results yet.</div>
  </div>

</div>

<script>
  const scheduleUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnsrFD-xSe7RDLO_PEcX6RMQ5HBPC9S3JhQ1i-Tek6m0Z6ZE0HeunDZ5xWNNkd5vwjJGFaN1EFubR9/pub?output=csv";

  const resultsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1iJY8XgcXtvO-p1fMzfhH77uLbub8KE9Z2HL6zAznAe688I5uLY61kvZQfHSU4N7sJU8b3TD33Yr_/pub?output=csv";

  function parseCSV(text) {
    return text.split(/\r?\n/).filter(r => r.trim() !== "")
      .map(row => row.split(",").map(cell => cell.trim()));
  }

  function getTeamLogo(team) {
    return `images/${team}-logo.png`;
  }

  function teamLink(team) {
    return `<a class="team-link" href="teams/${team}.html">${team}</a>`;
  }

  function fieldMapLink(field) {
    return `<a href="https://www.google.com/maps/search/${encodeURIComponent(field)}" target="_blank">${field}</a>`;
  }

  function classifyRow(dateString) {
    const today = new Date();
    const gameDate = new Date(dateString);
    if (isNaN(gameDate)) return "";
    if (gameDate.toDateString() === today.toDateString()) return "today";
    if (gameDate > today) return "future";
    return "past";
  }

  function renderEnhancedTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    const headers = data[0];
    let html = "<table><tr>";

    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      const rowClass = classifyRow(row[1]);
      html += `<tr class="${rowClass}">`;

      row.forEach((cell, i) => {
        let output = cell;

        if (headers[i].toLowerCase().includes("team")) {
          output = `<img class="team-logo" src="${getTeamLogo(cell)}" onerror="this.style.display='none'"> ${teamLink(cell)}`;
        }

        if (headers[i].toLowerCase().includes("field")) {
          output = fieldMapLink(cell);
        }

        html += `<td>${output}</td>`;
      });

      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  // -------------------------------
  // UPCOMING WEEK DETECTION
  // -------------------------------
  function getUpcomingWeek(scheduleRows) {
    const today = new Date();

    for (let i = 1; i < scheduleRows.length; i++) {
      const row = scheduleRows[i];
      const dateStr = row[1];
      if (!dateStr) continue;

      const gameDate = new Date(dateStr);
      if (gameDate >= today) return row[0];
    }

    return scheduleRows[scheduleRows.length - 1][0];
  }

  // -------------------------------
  // LOAD SCHEDULE (DEFAULT TO UPCOMING WEEK)
  // -------------------------------
  fetch(scheduleUrl)
    .then(res => res.text())
    .then(text => {
      const data = parseCSV(text);

      const weekIndex = data[0].findIndex(h => h.toLowerCase() === "week");
      const weeks = [...new Set(data.slice(1).map(r => r[weekIndex]))];

      const select = document.getElementById("week-select");
      weeks.forEach(w => {
        const opt = document.createElement("option");
        opt.value = w;
        opt.textContent = "Week " + w;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        const selected = select.value;
        if (selected === "all") {
          renderEnhancedTable(data, "schedule-container");
        } else {
          const filtered = [data[0], ...data.slice(1).filter(r => r[weekIndex] === selected)];
          renderEnhancedTable(filtered, "schedule-container");
        }
      });

      const upcomingWeek = getUpcomingWeek(data);
      const filtered = [data[0], ...data.slice(1).filter(r => r[weekIndex] === upcomingWeek)];
      renderEnhancedTable(filtered, "schedule-container");
    });

  // -------------------------------
  // LOAD RESULTS
  // -------------------------------
  Promise.all([
    fetch(scheduleUrl).then(r => r.text()),
    fetch(resultsUrl).then(r => r.text())
  ])
  .then(([scheduleText, resultsText]) => {
    const scheduleRows = parseCSV(scheduleText);
    const resultsRows = parseCSV(resultsText);

    let currentWeek = getUpcomingWeek(scheduleRows);

    const resultWeeks = [...new Set(resultsRows.slice(1).map(r => r[0]))];

    if (!resultWeeks.includes(currentWeek)) {
      currentWeek = resultWeeks[resultWeeks.length - 1];
    }

    const filteredResults = [
      resultsRows[0],
      ...resultsRows.slice(1).filter(r => r[0] == currentWeek)
    ];

    if (filteredResults.length <= 1) {
      document.getElementById("results-container").innerHTML = "No results yet.";
    } else {
      renderEnhancedTable(filteredResults, "results-container");
    }
  })
  .catch(() => {
    document.getElementById("results-container").innerHTML = "No results yet.";
  });
</script>

</body>
</html>
