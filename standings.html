<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Standings & Stats</title>

  <!-- Load global CSS (required for hamburger menu) -->
  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      overflow-x: hidden;
    }

    /* Background overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: 90%;
      opacity: 0.80;
      z-index: 0;
    }

    /* ⭐ NAV MUST BE ABOVE EVERYTHING */
    #nav-container {
      position: relative;
      z-index: 2000;
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    h1, h2 {
      margin-top: 30px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1000px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #ffcc00;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: rgba(255,255,255,0.05);
    }

    tr:hover td {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>

<script>
  // Load shared nav and attach hamburger click
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      const hamburger = navContainer.querySelector(".hamburger");
      const mobileMenu = navContainer.querySelector("#mobile-menu");

      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    });
</script>

<div class="page-content">

  <h1>Steel City Kickball — Standings & Stats</h1>

  <h2>Standings</h2>
  <div id="standings-container">Loading...</div>

  <h2>Betting Insights</h2>
  <div id="betting-container">Loading...</div>

  <h2>Advanced Stats</h2>
  <div id="advanced-container">Loading...</div>

</div>

<script>
  /* MVP AUTO‑BACKGROUND LOGIC */
  async function updateBackgroundFromMVP() {
    try {
      const response = await fetch(
        "https://raw.githubusercontent.com/SteelCityKickball/Steel-City-Kickball/main/data/mvp.json"
      );

      if (!response.ok) return;

      const data = await response.json();
      const mvpTeam = data.team;
      if (!mvpTeam) return;

      const logoPath = `images/${mvpTeam}-logo.png`;

      document.body.style.setProperty(
        "background",
        `radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%), url('${logoPath}') no-repeat center center fixed`
      );

      document.body.style.backgroundSize = "90%";
    } catch (err) {
      console.log("MVP background update failed:", err);
    }
  }

  updateBackgroundFromMVP();

  /* CSV SOURCES */
  const standingsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1iJY8XgcXtvO-p1fMzfhH77uLbub8KE9Z2HL6zAznAe688I5uLY61kvZQfHSU4N7sJU8b3TD33Yr_/pub?output=csv";

  const statsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?output=csv";

  const advancedUrl = standingsUrl;

  function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    return rows.map(row => row.split(",").map(cell => cell.trim()));
  }

  function renderTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    let html = "<table><tr>";
    data[0].forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      html += "<tr>";
      row.forEach(cell => html += `<td>${cell}</td>`);
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  fetch(standingsUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "standings-container"));

  fetch(statsUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "betting-container"));

  fetch(advancedUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "advanced-container"));
</script>

</body>
</html>
