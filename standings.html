<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Standings & Stats</title>

  <!-- Load global CSS -->
  <link rel="stylesheet" href="src/styles/main.css">
<link rel="stylesheet" href="src/styles/main.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      overflow-x: hidden;
    }

    /* Background overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: 90%;
      opacity: 0.80;
      z-index: 0;
    }

    /* ⭐ FIX: nav must be above everything */
    #nav-container {
      position: relative;
      z-index: 2000;
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    h1, h2 {
      margin-top: 30px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
      max-width: 1000px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #ffcc00;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: rgba(255,255,255,0.05);
    }

    tr:hover td {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>

<script>
  // Load shared nav
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // ⭐ Attach hamburger click AFTER nav loads
      const hamburger = navContainer.querySelector(".hamburger");
      const mobileMenu = navContainer.querySelector("#mobile-menu");

      hamburger.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
      });
    });
</script>

</div>
