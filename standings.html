<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Standings & Stats</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    /* PAGE-SPECIFIC STYLES ONLY */
    h1, h2 {
      margin-top: 30px;
      text-shadow: 1px 1px 2px black;
    }

    /* Mobile-friendly table wrapper */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      margin: 0 auto;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 1000px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      color: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }

    th {
      background: rgba(0,0,0,0.9);
      color: #C0C0C0;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: rgba(255,255,255,0.05);
    }

    tr:hover td {
      background: rgba(255,255,255,0.12);
    }

    @media (max-width: 768px) {
      table {
        width: 900px;
      }

      th, td {
        padding: 8px;
        font-size: 13px;
      }
    }
  </style>
  <script src="src/scripts/global-identity.js" defer></script>
</head>

<body>

<!-- EVERYTHING MUST BE INSIDE page-content -->
<div class="page-content">

  <!-- NAVIGATION -->
  <div id="nav-container"></div>

 <script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // ⭐ Identity (controls login/logout/avatar)
      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      // ⭐ Hamburger (mobile menu)
      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }

      // ⭐ Mobile dropdowns (More ▾)
      navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.parentElement.classList.toggle("open");
        });
      });
    })
    .catch(err => console.error("Nav load failed:", err));
</script>

  <!-- PAGE CONTENT -->
  <h1>Steel City Kickball — Standings & Stats</h1>

  <h2>Standings</h2>
  <div class="table-wrapper">
    <div id="standings-container">Loading...</div>
  </div>

  <h2>Betting Insights</h2>
  <div class="table-wrapper">
    <div id="betting-container">Loading...</div>
  </div>

  <h2>Advanced Stats</h2>
  <div class="table-wrapper">
    <div id="advanced-container">Loading...</div>
  </div>

</div> <!-- END page-content -->

<script>
  /* MVP AUTO‑BACKGROUND LOGIC */
  async function updateBackgroundFromMVP() {
    try {
      const response = await fetch(
        "https://raw.githubusercontent.com/SteelCityKickball/Steel-City-Kickball/main/data/mvp.json"
      );
      if (!response.ok) return;

      const data = await response.json();
      const mvpTeam = data.team;
      if (!mvpTeam) return;

      const logoPath = `images/${mvpTeam}-logo.png`;

      document.body.style.setProperty(
        "background",
        `radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%), url('${logoPath}') no-repeat center center fixed`
      );
      document.body.style.backgroundSize = "90%";
    } catch (err) {
      console.log("MVP background update failed:", err);
    }
  }

  updateBackgroundFromMVP();

  /* CSV SOURCES */
  const standingsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1iJY8XgcXtvO-p1fMzfhH77uLbub8KE9Z2HL6zAznAe688I5uLY61kvZQfHSU4N7sJU8b3TD33Yr_/pub?output=csv";

  const statsUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?output=csv";

  const advancedUrl = standingsUrl;

  function parseCSV(text) {
    return text.split(/\r?\n/).filter(r => r.trim() !== "")
      .map(row => row.split(",").map(cell => cell.trim()));
  }

  function renderTable(data, containerId) {
    if (data.length < 2) {
      document.getElementById(containerId).innerHTML = "No data available.";
      return;
    }

    let html = "<table><tr>";
    data[0].forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    data.slice(1).forEach(row => {
      html += "<tr>";
      row.forEach(cell => html += `<td>${cell}</td>`);
      html += "</tr>";
    });

    html += "</table>";
    document.getElementById(containerId).innerHTML = html;
  }

  fetch(standingsUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "standings-container"));

  fetch(statsUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "betting-container"));

  fetch(advancedUrl)
    .then(res => res.text())
    .then(text => renderTable(parseCSV(text), "advanced-container"));
</script>

</body>
</html>
