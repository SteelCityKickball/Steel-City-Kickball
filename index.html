<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Scores & Standings</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #standingsTable, #gamesTable {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    #standingsTable th, #standingsTable td,
    #gamesTable th, #gamesTable td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #222;
      color: white;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
      color: #444;
    }
  </style>
</head>

<body>

  <h1>Steel City Kickball — Scores & Standings</h1>

  <div class="loading" id="loadingMessage">Loading latest scores…</div>

  <h2>Standings</h2>
  <table id="standingsTable">
    <tr>
      <th>Team</th>
      <th>Wins</th>
      <th>Losses</th>
    </tr>
  </table>

  <h2>Game Results</h2>
  <table id="gamesTable">
    <tr>
      <th>Date</th>
      <th>Home Team</th>
      <th>Home Score</th>
      <th>Away Team</th>
      <th>Away Score</th>
    </tr>
  </table>

  <script>
    async function loadScoresFromSheet() {
      const sheetUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjCOIOADqzgiT9RPU9tBGBkpvnL2DP7gXrjkMhwY0DWuNK65XLuBjKV-d1sVXRsQzAbAXBEauAwoT7/pub?output=csv";

      try {
        const response = await fetch(sheetUrl);
        const csvText = await response.text();

        const rows = csvText
          .trim()
          .split("\n")
          .map((r) => r.split(","));

        // Remove header row
        const games = rows.slice(1).map((r) => ({
          date: r[0],
          homeTeam: r[1],
          homeScore: Number(r[2]),
          awayTeam: r[3],
          awayScore: Number(r[4]),
        }));

        updateStandings(games);
        renderGames(games);

        document.getElementById("loadingMessage").style.display = "none";
      } catch (error) {
        document.getElementById("loadingMessage").innerText =
          "Error loading Google Sheet data.";
      }
    }

    function updateStandings(games) {
      const standings = {};

      games.forEach((g) => {
        if (!standings[g.homeTeam])
          standings[g.homeTeam] = { wins: 0, losses: 0 };
        if (!standings[g.awayTeam])
          standings[g.awayTeam] = { wins: 0, losses: 0 };

        if (g.homeScore > g.awayScore) {
          standings[g.homeTeam].wins++;
          standings[g.awayTeam].losses++;
        } else {
          standings[g.awayTeam].wins++;
          standings[g.homeTeam].losses++;
        }
      });

      const table = document.getElementById("standingsTable");

      Object.entries(standings).forEach(([team, record]) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${team}</td>
          <td>${record.wins}</td>
          <td>${record.losses}</td>
        `;
        table.appendChild(row);
      });
    }

    function renderGames(games) {
      const table = document.getElementById("gamesTable");

      games.forEach((g) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${g.date}</td>
          <td>${g.homeTeam}</td>
          <td>${g.homeScore}</td>
          <td>${g.awayTeam}</td>
          <td>${g.awayScore}</td>
        `;
        table.appendChild(row);
      });
    }

    loadScoresFromSheet();
  </script>
</body>
</html>
