<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>
  <link rel="stylesheet" href="src/styles/main.css">
</head>

<body>

<div class="page-content">

  <!-- NAVIGATION -->
  <div id="nav-container"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="src/assets/Amazinglogo.png" alt="Steel City Kickball Logo">
  </div>

  <!-- GAME OF THE WEEK -->
  <section>
    <h2>Game of the Week</h2>
    <img id="gotw-img" src="" alt="Game of the Week">
    <p id="gotw-text" class="blurb"></p>
  </section>

  <!-- MVP -->
  <section>
    <h2>Game MVP</h2>
    <img id="mvp-img" src="" alt="Game MVP">
    <p id="mvp-text" class="blurb"></p>
  </section>

  <!-- PHOTO STRIP -->
  <div id="photo-strip" class="photo-strip"></div>

  <!-- ABOUT -->
  <div class="about">
    <p>
      Welcome to the official home of Steel City Kickball!  
      Check out standings, schedules, teams, and player resources.
    </p>
  </div>

  <a class="button" href="standings.html">View Standings</a>

</div>

<!-- LOAD IDENTITY SCRIPT FIRST -->
<script type="module" src="src/scripts/global-identity.js"></script>

<!-- THEN LOAD NAV -->
<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;

      // identity script is already loaded now
      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      const hamburger = document.getElementById("hamburger-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    });
</script>

</body>
</html>
