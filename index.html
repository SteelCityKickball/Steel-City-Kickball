<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="src/styles/main.css">

  <!-- Homepage Logic (GOTW/MVP/Updates/Commissioner + GitHub API images) -->
  <script src="src/scripts/homepage.js" defer></script>

  <!-- Identity Script -->
  <script type="module" src="src/identity/global-identity.js"></script>
</head>

<body class="home">

<div class="page-content">

  <!-- NAVIGATION -->
  <div id="nav-container"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="src/assets/Amazinglogo.png" alt="Steel City Kickball Logo">
  </div>

  <!-- GAME OF THE WEEK -->
  <section>
    <h2>Game of the Week</h2>
    <img id="gotw-img" src="" alt="Game of the Week">
    <p id="gotw-text" class="blurb"></p>
  </section>

  <!-- MVP -->
  <section>
    <h2>Game MVP</h2>
    <img id="mvp-img" src="" alt="Game MVP">
    <p id="mvp-text" class="blurb"></p>
  </section>

  <!-- LEAGUE UPDATES -->
  <section class="homepage-section">
    <h2>League Updates</h2>
    <p id="league-updates"></p>
  </section>

  <!-- COMMISSIONER MESSAGE -->
  <section class="homepage-section">
    <h2>Word from the Commissioner</h2>
    <p id="commissioner-message"></p>
  </section>

  <!-- PHOTO STRIP -->
  <div id="photo-strip" class="photo-strip"></div>

  <!-- ABOUT -->
  <div class="about">
    <p>
      Welcome to the official home of Steel City Kickball!  
      Check out standings, schedules, teams, and player resources.
    </p>
  </div>

  <a class="button" href="standings.html">View Standings</a>

</div>

<!-- LOAD NAV -->
<script>
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // Apply identity AFTER nav loads
      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");

      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    })
    .catch(err => console.error("Nav load failed:", err));
</script>

</body>
</html>
