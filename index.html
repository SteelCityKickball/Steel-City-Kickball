<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    /* NAV BAR */
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
      margin: 0;
      background: #000;
    }
    nav a {
      text-decoration: none;
      font-weight: bold;
      color: #fff;
      font-size: 18px;
    }
    nav a:hover {
      color: #ffcc00;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(to bottom, #000 45%, #c00000 55%);
      padding: 80px 20px;
      text-align: center;
    }

    /* SIZE THE LOGO IMAGE */
    .hero img {
      width: 80vw;
      max-width: 1000px;
    }

    /* PHOTO STRIP */
    .photo-strip {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 20px;
      background: #fff;
    }
    .photo-strip img {
      height: 200px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* ABOUT SECTION */
    .about {
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
    }
    .about p {
      font-size: 18px;
      line-height: 1.6;
    }

    /* BUTTON */
    .button {
      display: inline-block;
      padding: 12px 20px;
      margin-top: 20px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
    }
    .button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<nav>
  <ul>
    <li><a href="/Steel-City-Kickball/">Home</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="standings.html">Standings</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="waiver.html">Waivers</a></li>
  </ul>
</nav>

<!-- HERO SECTION -->
<div class="hero">
  <img src="Amazinglogo.png" alt="Steel City Kickball Logo">
</div>

<!-- PHOTO STRIP -->
<div id="photo-strip" class="photo-strip"></div>

<!-- ABOUT SECTION -->
<div class="about">
  <p>
    Welcome to the official home of Steel City Kickball!  
    Check out standings, schedules, teams, and player resources.
  </p>
</div>

<a class="button" href="standings.html">View Standings</a>

</body>
</html>
