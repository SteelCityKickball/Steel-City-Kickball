<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    .blurb {
      font-size: 18px;
      margin-top: 10px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(to bottom, #000 45%, #c00000 55%);
      padding: 80px 20px;
      text-align: center;
    }
    .hero img {
      width: 80vw;
      max-width: 1000px;
    }

    /* FEATURE SECTIONS */
    section {
      padding: 30px 20px;
      background: #fff;
      margin-top: 20px;
    }
    section img {
      width: 90%;
      max-width: 600px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* PHOTO STRIP */
    .photo-strip {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 20px;
      background: #fff;
    }
    .photo-strip img {
      height: 200px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* ABOUT SECTION */
    .about {
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
    }
    .about p {
      font-size: 18px;
      line-height: 1.6;
    }

    /* BUTTON */
    .button {
      display: inline-block;
      padding: 12px 20px;
      margin-top: 20px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
    }
    .button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<!-- ⭐ NEW DYNAMIC NAVIGATION ⭐ -->
<div id="nav-container"></div>
<script>
  fetch("/src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;
    });
</script>

<!-- HERO SECTION -->
<div class="hero">
  <img src="Amazinglogo.png" alt="Steel City Kickball Logo">
</div>

<!-- GAME OF THE WEEK -->
<section>
  <h2>Game of the Week</h2>
  <img id="gotw-img" src="" alt="Game of the Week">
  <p id="gotw-text" class="blurb"></p>
</section>

<!-- MVP -->
<section>
  <h2>Game MVP</h2>
  <img id="mvp-img" src="" alt="Game MVP">
  <p id="mvp-text" class="blurb"></p>
</section>

<!-- PHOTO STRIP -->
<div id="photo-strip" class="photo-strip"></div>

<!-- ABOUT SECTION -->
<div class="about">
  <p>
    Welcome to the official home of Steel City Kickball!  
    Check out standings, schedules, teams, and player resources.
  </p>
</div>

<a class="button" href="standings.html">View Standings</a>

<!-- AUTO-UPDATE SCRIPT -->
<script>
async function getLatestFromGitHub(path) {
  const apiUrl = `https://api.github.com/repos/SteelCityKickball/Steel-City-Kickball/contents/${path}`;
  const response = await fetch(apiUrl);
  const files = await response.json();

  const images = files.filter(f =>
    f.name.match(/\.(jpg|jpeg|png|gif)$/i)
  );

  images.sort((a, b) => b.name.localeCompare(a.name));
  return images;
}

async function loadImages() {

  /* ⭐ MANUAL TEXT YOU CAN EDIT ANYTIME ⭐ */
  document.getElementById("gotw-text").innerText =
    "Week 3 — Red Rockets vs Blue Bombers. A wild 9–8 finish with a walk-off kick!";

  document.getElementById("mvp-text").innerText =
    "Jordan M. — 3 RBIs, 2 catches, and a game-saving play!";

  /* ⭐ AUTO-LOADING IMAGES ⭐ */

  // GOTW
  const gotw = await getLatestFromGitHub("images/gotw");
  if (gotw.length > 0) {
    document.getElementById("gotw-img").src = gotw[0].download_url;
  }

  // MVP
  const mvp = await getLatestFromGitHub("images/mvp");
  if (mvp.length > 0) {
    document.getElementById("mvp-img").src = mvp[0].download_url;
  }

  // HOMEPAGE PHOTOS
  const homepage = await getLatestFromGitHub("images/homepage");
  const strip = document.getElementById("photo-strip");

  homepage.slice(0, 3).forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    strip.appendChild(img);
  });
}

loadImages();
</script>

</body>
</html>
