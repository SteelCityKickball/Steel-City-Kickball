<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>

  <!-- Load global CSS -->
  <link rel="stylesheet" href="/Steel-City-Kickball/src/styles/main.css">
</head>

<body>

<!-- ⭐ NAVIGATION ⭐ -->
<div id="nav-container"></div>
<script type="module">
  import { applyIdentityToUI } from "/Steel-City-Kickball/src/scripts/global-identity.js";

  fetch("/Steel-City-Kickball/src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("nav-container").innerHTML = html;

      // Run identity AFTER nav loads
      applyIdentityToUI();

      // Hamburger
      const hamburger = document.getElementById("hamburger-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    });
</script>

<!-- HERO SECTION -->
<div class="hero">
  <img src="/Steel-City-Kickball/src/assets/Amazinglogo.png" alt="Steel City Kickball Logo">
</div>

<!-- GAME OF THE WEEK -->
<section>
  <h2>Game of the Week</h2>
  <img id="gotw-img" src="" alt="Game of the Week">
  <p id="gotw-text" class="blurb"></p>
</section>

<!-- MVP -->
<section>
  <h2>Game MVP</h2>
  <img id="mvp-img" src="" alt="Game MVP">
  <p id="mvp-text" class="blurb"></p>
</section>

<!-- PHOTO STRIP -->
<div id="photo-strip" class="photo-strip"></div>

<!-- ABOUT SECTION -->
<div class="about">
  <p>
    Welcome to the official home of Steel City Kickball!  
    Check out standings, schedules, teams, and player resources.
  </p>
</div>

<a class="button" href="/Steel-City-Kickball/standings.html">View Standings</a>

<!-- AUTO-UPDATE SCRIPT -->
<script>
async function getLatestFromGitHub(path) {
  const apiUrl = `https://api.github.com/repos/SteelCityKickball/Steel-City-Kickball/contents/${path}`;
  const response = await fetch(apiUrl);
  const files = await response.json();

  const images = files.filter(f =>
    f.name.match(/\.(jpg|jpeg|png|gif)$/i)
  );

  images.sort((a, b) => b.name.localeCompare(a.name));
  return images;
}

async function loadImages() {

  /* ⭐ MANUAL TEXT ⭐ */
  document.getElementById("gotw-text").innerText =
    "Week 3 — Red Rockets vs Blue Bombers. A wild 9–8 finish with a walk-off kick!";

  document.getElementById("mvp-text").innerText =
    "Jordan M. — 3 RBIs, 2 catches, and a game-saving play!";

  /* ⭐ AUTO-LOADING IMAGES ⭐ */

  // GOTW
  const gotw = await getLatestFromGitHub("images/gotw");
  if (gotw.length > 0) {
    document.getElementById("gotw-img").src = gotw[0].download_url;
  }

  // MVP
  const mvp = await getLatestFromGitHub("images/mvp");
  if (mvp.length > 0) {
    document.getElementById("mvp-img").src = mvp[0].download_url;
  }

  // HOMEPAGE PHOTOS
  const homepage = await getLatestFromGitHub("images/homepage");
  const strip = document.getElementById("photo-strip");

  homepage.slice(0, 3).forEach(file => {
    const img = document.createElement("img");
    img.src = file.download_url;
    strip.appendChild(img);
  });
}

loadImages();
</script>

</body>
</html>
