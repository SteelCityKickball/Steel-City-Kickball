<!-- RUN IDENTITY IMMEDIATELY ON PAGE LOAD -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (window.applyIdentityToUI) {
      applyIdentityToUI();
    }
  });
</script>

<!-- FIXED NAV PATH -->
<script>
  fetch("/Steel-City-Kickball/src/components/nav.html?v=20")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      /* Run identity AGAIN after nav loads */
      if (window.applyIdentityToUI) {
        applyIdentityToUI();
      }

      setTimeout(() => {
        if (window.applyIdentityToUI) applyIdentityToUI();
      }, 300);

      // Mobile menu toggle
      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }
    })
    .catch(err => console.error("Nav load failed:", err));
</script>
