<!-- redeploy fix -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Home</title>

  <!-- FIXED CSS PATH -->
  <link rel="stylesheet" href="/Steel-City-Kickball/src/styles/main.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- FIXED GLOBAL IDENTITY PATH -->
  <script src="/Steel-City-Kickball/src/identity/global-identity.js" defer></script>
</head>

<body class="home">

<div id="version-tag" style="color: yellow; font-size: 20px; text-align:center; margin-top:20px;">
  VERSION 9
</div>

<div class="page-content">

  <!-- NAVIGATION -->
  <div id="nav-container"></div>

  <!-- HERO -->
  <div class="hero">
    <img src="/Steel-City-Kickball/src/assets/Amazinglogo.png" alt="Steel City Kickball Logo">
  </div>

  <!-- GAME OF THE WEEK -->
  <section>
    <h2>Game of the Week</h2>
    <img id="gotw-img" src="" alt="Game of the Week">
    <p id="gotw-text" class="blurb"></p>
  </section>

  <!-- MVP -->
  <section>
    <h2>Game MVP</h2>
    <img id="mvp-img" src="" alt="Game MVP">
    <p id="mvp-text" class="blurb"></p>
  </section>

  <!-- LEAGUE UPDATES -->
  <section class="homepage-section">
    <h2>League Updates</h2>
    <p id="league-updates"></p>
  </section>

  <!-- COMMISSIONER MESSAGE -->
  <section class="homepage-section">
    <h2>Word from the Commissioner</h2>
    <p id="commissioner-message"></p>
  </section>

  <!-- PHOTO STRIP -->
  <div id="photo-strip" class="photo-strip"></div>

  <!-- ABOUT -->
  <div class="about">
    <p>
      Welcome to the official home of Steel City Kickball!  
      Check out standings, schedules, teams, and player resources.
    </p>
  </div>

  <a class="button" href="standings.html">View Standings</a>

</div>

<!-- FIXED NAV FETCH PATH -->
<script>
  fetch("/Steel-City-Kickball/src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      if (window.applyIdentityToUI) {
        window.applyIdentityToUI();
      }

      const hamburger = navContainer.querySelector("#hamburger-btn");
      const mobileMenu = navContainer.querySelector("#mobile-menu");
      if (hamburger && mobileMenu) {
        hamburger.addEventListener("click", () => {
          mobileMenu.classList.toggle("open");
        });
      }

      navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.parentElement.classList.toggle("open");
        });
      });
    })
    .catch(err => console.error("Nav load failed:", err));
</script>

<!-- FIXED HOMEPAGE JS PATH -->
<script src="/Steel-City-Kickball/src/scripts/homepage.js"></script>

</body>
</html>
