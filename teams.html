<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Teams</title>

  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    /* PAGE-SPECIFIC ONLY — no layout overrides */

    .team-card {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .team-card h3 {
      margin: 0 0 10px 0;
    }

    .team-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    .team-card a:hover {
      background: #444;
    }
  </style>
  <script src="src/scripts/global-identity.js" defer></script>
</head>

<body>

<div class="page-content">

  <!-- NAVIGATION -->
  <div id="nav-container"></div>

  <script>
    fetch("src/components/nav.html")
      .then(res => res.text())
      .then(html => {
        const navContainer = document.getElementById("nav-container");
        navContainer.innerHTML = html;

        // Identity
        if (window.applyIdentityToUI) {
          window.applyIdentityToUI();
        }

        // Hamburger
        const hamburger = navContainer.querySelector("#hamburger-btn");
        const mobileMenu = navContainer.querySelector("#mobile-menu");
        if (hamburger && mobileMenu) {
          hamburger.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
          });
        }

        // Mobile dropdowns
        navContainer.querySelectorAll(".mobile-menu .dropdown-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            btn.parentElement.classList.toggle("open");
          });
        });
      });
  </script>

  <!-- PAGE CONTENT -->
  <h1>Steel City Kickball — Teams</h1>
  <p>Select a team to view more details.</p>

  <div class="team-card">
    <h3>Bonnies Babies</h3>
    <a href="teams/bonnies-babies.html">View Team Page</a>
  </div>

  <div class="team-card">
    <h3>J4K</h3>
    <a href="teams/j4k.html">View Team Page</a>
  </div>

  <div class="team-card">
    <h3>Warriors</h3>
    <a href="teams/warriors.html">View Team Page</a>
  </div>

  <div class="team-card">
    <h3>Gonzalez</h3>
    <a href="teams/gonzalez.html">View Team Page</a>
  </div>

  <div class="team-card">
    <h3>The Club</h3>
    <a href="teams/the-club.html">View Team Page</a>
  </div>

  <div class="team-card">
    <h3>Kickaholics</h3>
    <a href="teams/kickaholics.html">View Team Page</a>
  </div>

</div>

</body>
</html>
