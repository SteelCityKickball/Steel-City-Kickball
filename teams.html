<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Kickball — Teams</title>

  <!-- Load global CSS -->
  <link rel="stylesheet" href="src/styles/main.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(140,0,0,0.55) 0%, rgba(0,0,0,0.90) 80%),
        url("Amazinglogo.png") no-repeat center center fixed;
      background-size: 90%;
      opacity: 0.80;
      z-index: 0;
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    h1 {
      margin-top: 30px;
    }

    .team-card {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .team-card h3 {
      margin: 0 0 10px 0;
    }

    .team-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    .team-card a:hover {
      background: #444;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div id="nav-container"></div>

<script>
  // Load shared nav
  fetch("src/components/nav.html")
    .then(res => res.text())
    .then(html => {
      const navContainer = document.getElementById("nav-container");
      navContainer.innerHTML = html;

      // Attach hamburger click AFTER nav loads
      const hamburger = navContainer.querySelector(".hamburger");
      const mobileMenu = navContainer.querySelector("#mobile-menu");

      hamburger.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
      });
    });
</script>

<div class="page-content">

<h1>Steel City Kickball — Teams</h1>
<p>Select a team to view more details.</p>

<div class="team-card">
  <h3>Bonnies Babies</h3>
  <a href="teams/bonnies-babies.html">View Team Page</a>
</div>

<div class="team-card">
  <h3>J4K</h3>
  <a href="teams/j4k.html">View Team Page</a>
</div>

<div class="team-card">
  <h3>Warriors</h3>
  <a href="teams/warriors.html">View Team Page</a>
</div>

<div class="team-card">
  <h3>Gonzalez</h3>
  <a href="teams/gonzalez.html">View Team Page</a>
</div>

<div class="team-card">
  <h3>The Club</h3>
  <a href="teams/the-club.html">View Team Page</a>
</div>

<div class="team-card">
  <h3>Kickaholics</h3>
  <a href="teams/kickaholics.html">View Team Page</a>
</div>

</div>

</body>
</html>
